name: Docker Publish

on:
  push:
    branches: [main]
    tags: ['v*']

env:
  REGISTRY: ghcr.io
  FORGE_IMAGE: ghcr.io/100monkeys-ai/forge
  FOUNDRY_IMAGE: ghcr.io/100monkeys-ai/foundry

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - uses: docker/metadata-action@v5
        id: forge-meta
        with:
          images: ${{ env.FORGE_IMAGE }}
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=sha
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: docker/Dockerfile.forge
          push: true
          tags: ${{ steps.forge-meta.outputs.tags }}
          labels: ${{ steps.forge-meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
